<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Para Agatha ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9eb5,#ff6f91);
font-family:Poppins;
overflow:hidden;
}

/* envelope */

.envelope{
width:320px;
height:200px;
background:#ff4d6d;
position:relative;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
transition:0.8s;
}

.envelope::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:#ff6f91;
clip-path:polygon(0 0,50% 60%,100% 0);
transition:0.8s;
}

.open-btn{
position:relative;
z-index:2;
background:white;
padding:12px 28px;
border-radius:30px;
border:none;
font-size:16px;
cursor:pointer;
}

/* carta */

.letter{
position:absolute;
width:320px;
background:white;
padding:30px;
border-radius:12px;
text-align:center;
box-shadow:0 15px 35px rgba(0,0,0,0.25);
transform:translateY(60px) scale(0.8);
opacity:0;
transition:1s;
}

.letter h1{
font-family:'Great Vibes';
color:#ff4d6d;
font-size:42px;
margin-bottom:15px;
}

.text{
color:#444;
line-height:1.7;
font-size:18px;
}

.name{
color:#ff4d6d;
font-weight:500;
}

/* carta aberta */

.open .letter{
transform:translateY(-40px) scale(1);
opacity:1;
}

.open .envelope{
transform:scale(0.9);
opacity:0;
}

/* corações */

.heart{
position:fixed;
top:-10px;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall{

0%{
transform:translateY(-10vh);
opacity:1;
}

100%{
transform:translateY(110vh);
opacity:0;
}

}

</style>
</head>

<body>

<div id="container">

<div class="envelope" onclick="abrirCarta()">
<button class="open-btn">Abrir</button>
</div>

<div class="letter">

<h1>Agatha ❤️</h1>

<div class="text">

🌹 Feliz Dia das Mulheres,  
<span class="name">Agatha</span>.

<br><br>

Você é uma mulher incrível,  
linda, forte e especial.

<br><br>

Seu sorriso ilumina meus dias  
e sua presença faz tudo ficar melhor.

<br><br>

Hoje é o seu dia,  
mas para mim todos os dias  
são especiais por ter você.

<br><br>

Com carinho ❤️

</div>

</div>

</div>

<script>

function abrirCarta(){

document.getElementById("container").classList.add("open")

for(let i=0;i<30;i++){
criarCoracao()
}

}

/* corações */

function criarCoracao(){

const heart=document.createElement("div")

heart.classList.add("heart")

heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"
heart.style.animationDuration=(3+Math.random()*3)+"s"
heart.style.fontSize=(16+Math.random()*24)+"px"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},6000)

}

setInterval(criarCoracao,400)

</script>

</body>
</html>
