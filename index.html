<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Para Agatha ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9eb5,#ff6f91);
font-family:Poppins;
overflow:hidden;
}

/* envelope */

.envelope{
position:relative;
width:340px;
height:220px;
cursor:pointer;
}

.envelope-body{
position:absolute;
width:100%;
height:100%;
background:#ff4d6d;
border-radius:8px;
z-index:2;
}

/* tampa do envelope */

.flap{
position:absolute;
width:100%;
height:100%;
background:#ff6f91;
clip-path:polygon(0 0,100% 0,50% 60%);
transform-origin:top;
transition:1s;
z-index:3;
}

/* carta */

.letter{
position:absolute;
bottom:10px;
left:10px;
width:320px;
height:200px;
background:white;
border-radius:10px;
padding:25px;
text-align:center;
box-shadow:0 15px 35px rgba(0,0,0,0.25);
transform:translateY(120px);
transition:1.2s;
z-index:1;
}

.letter h1{
font-family:'Great Vibes';
font-size:42px;
color:#ff4d6d;
margin-bottom:10px;
}

.text{
font-size:17px;
color:#444;
line-height:1.7;
}

.name{
color:#ff4d6d;
font-weight:500;
}

/* estado aberto */

.open .flap{
transform:rotateX(180deg);
}

.open .letter{
transform:translateY(-180px) scale(1.1);
}

/* botão */

.open-btn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:4;
padding:10px 25px;
border:none;
border-radius:30px;
background:white;
cursor:pointer;
font-size:15px;
}

.open .open-btn{
display:none;
}

/* corações */

.heart{
position:fixed;
top:-10px;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall{

0%{
transform:translateY(-10vh);
opacity:1;
}

100%{
transform:translateY(110vh);
opacity:0;
}

}

</style>
</head>

<body>

<div class="envelope" id="env">

<div class="flap"></div>

<div class="envelope-body"></div>

<button class="open-btn" onclick="abrir()">Abrir</button>

<div class="letter">

<h1>Agatha ❤️</h1>

<div class="text">

🌹 Feliz Dia das Mulheres,  
<span class="name">Agatha</span>.

<br><br>

Você é uma mulher incrível,  
linda, forte e muito especial.

<br><br>

Seu sorriso ilumina meus dias  
e sua presença deixa tudo melhor.

<br><br>

Hoje é o seu dia,  
mas para mim todos os dias  
são especiais por ter você.

<br><br>

Com carinho ❤️

</div>

</div>

</div>

<script>

function abrir(){

document.getElementById("env").classList.add("open")

for(let i=0;i<35;i++){
criarCoracao()
}

}

function criarCoracao(){

const heart=document.createElement("div")

heart.classList.add("heart")

heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"
heart.style.animationDuration=(3+Math.random()*3)+"s"
heart.style.fontSize=(16+Math.random()*24)+"px"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},6000)

}

setInterval(criarCoracao,400)

</script>

</body>
</html>
