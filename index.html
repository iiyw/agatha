<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Para Agatha ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#ff758c,#ff7eb3);
font-family:Poppins;
overflow:hidden;
}

/* card principal */

.card{
background:white;
padding:50px;
border-radius:25px;
text-align:center;
width:420px;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
animation:fade 1.5s;
z-index:2;
}

h1{
font-family:'Great Vibes';
font-size:48px;
color:#ff4d6d;
margin-bottom:15px;
}

.subtitle{
color:#555;
margin-bottom:30px;
}

/* botão */

button{
padding:16px 40px;
font-size:18px;
border:none;
border-radius:50px;
background: linear-gradient(45deg,#ff4d6d,#ff758c);
color:white;
cursor:pointer;
transition:0.3s;
box-shadow:0 10px 20px rgba(255,77,109,0.4);
}

button:hover{
transform:scale(1.1);
}

/* mensagem */

.message{
margin-top:30px;
font-size:20px;
color:#444;
opacity:0;
transform:translateY(20px);
transition:0.8s;
}

.message.show{
opacity:1;
transform:translateY(0);
}

.name{
color:#ff4d6d;
font-weight:500;
}

/* corações */

.heart{
position:fixed;
top:-10px;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall{
0%{
transform:translateY(-10vh);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}

@keyframes fade{
from{
opacity:0;
transform:scale(0.9);
}
to{
opacity:1;
transform:scale(1);
}

}

</style>
</head>

<body>

<div class="card">

<h1>Agatha ❤️</h1>

<div class="subtitle">
Tenho algo especial para você...
</div>

<button onclick="mostrarMensagem()">
Clique aqui
</button>

<div class="message" id="msg">

🌹 Feliz Dia das Mulheres, <span class="name">Agatha</span>!  

<br><br>

Você é uma mulher incrível, linda e muito especial.  
Que seu dia seja cheio de amor, sorrisos e momentos felizes.  

<br><br>

Obrigado por existir. ❤️

</div>

</div>

<script>

function mostrarMensagem(){
document.getElementById("msg").classList.add("show")
}

/* corações */

function criarCoracao(){

const heart = document.createElement("div")
heart.classList.add("heart")

heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"
heart.style.animationDuration=(3+Math.random()*3)+"s"
heart.style.fontSize=(16+Math.random()*20)+"px"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},6000)

}

setInterval(criarCoracao,250)

</script>

</body>
</html>
